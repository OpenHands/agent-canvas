name: Bug Report
description: Report a bug or unexpected behavior in Agent Canvas.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      description: How did you install / run Agent Canvas?
      options:
        - npm (`npx @openhands/agent-canvas` or `npm install -g @openhands/agent-canvas`)
        - Docker (`ghcr.io/openhands/agent-canvas`)
        - From source (`npm run dev` / `npm run dev:minimal`)
        - Other
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Agent Canvas Version
      description: Which version are you running? Check with `agent-canvas --version` or `docker inspect`.
      options:
        - v1.0.0-alpha.6 (latest)
        - v1.0.0-alpha.5
        - v1.0.0-alpha.4
        - v1.0.0-alpha.3
        - v1.0.0-alpha.2
        - main (built from source)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Paste any error messages, console output, or screenshots that help explain the issue.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else that might be helpful (config, workarounds tried, etc.).
    validations:
      required: false
