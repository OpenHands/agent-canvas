name: Mock-LLM E2E Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  workflow_dispatch:

concurrency:
  group: mock-llm-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  mock-llm-e2e:
    # Run when the PR has the 'e2e-tests' label, or on manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'e2e-tests'))
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    env:
      MOCK_LLM_REPORT_PATH: mock-llm-report.md
      MOCK_LLM_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read defaults from config/defaults.json
        id: defaults
        run: |
          echo "agent_server_version=$(node -p "require('./config/defaults.json').versions.agentServer")" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Pin to 24.15.x — Node 24.16.0 has a zip-extraction regression
          # (nodejs/node#63487) that hangs `playwright install` for Playwright
          # < 1.60.0. Remove this pin after upgrading to Playwright >= 1.60.0.
          node-version: "24.15"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Get Playwright version
        id: pw_version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw_cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw_version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw_cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install openhands-sdk (for mock LLM server)
        run: |
          uv venv .mock-llm-venv
          uv pip install -p .mock-llm-venv openhands-sdk==${{ steps.defaults.outputs.agent_server_version }}

      - name: Verify mock LLM server starts
        run: |
          .mock-llm-venv/bin/python3 tests/e2e/mock-llm/scripts/mock-llm-server.py --port 9998 &
          SERVER_PID=$!
          # Retry up to 30 seconds — openhands-sdk's litellm import is slow
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:9998/v1/chat/completions \
              -H "Content-Type: application/json" \
              -d '{"model":"test","messages":[]}' > /dev/null 2>&1; then
              echo "Mock LLM server responded on attempt $i"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:9998/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"test","messages":[]}' | python3 -m json.tool
          kill $SERVER_PID

      - name: Run mock-LLM E2E tests
        id: run_tests
        env:
          MOCK_LLM_PYTHON: .mock-llm-venv/bin/python3
        run: |
          set +e
          PW_LOG="test-results-mock-llm/pw-output.log"
          mkdir -p test-results-mock-llm
          touch "$PW_LOG"

          # Run Playwright in background, writing output to a log file.
          # Our shell survives even if we have to kill Playwright (the
          # webServer teardown can hang indefinitely on agent-server).
          npm run test:e2e:mock-llm > "$PW_LOG" 2>&1 &
          PW_PID=$!

          # Tail the log in background so CI still shows real-time output.
          tail -f "$PW_LOG" &
          TAIL_PID=$!

          # Phase 1: Wait up to 5 min for the test summary to appear.
          # Playwright's line reporter prints "N passed" in real-time,
          # before webServer teardown starts.
          test_deadline=$((SECONDS + 300))
          tests_done=false
          while [ "$SECONDS" -lt "$test_deadline" ]; do
            if ! kill -0 "$PW_PID" 2>/dev/null; then
              break  # Playwright exited naturally
            fi
            if grep -qE "[0-9]+ passed" "$PW_LOG" 2>/dev/null; then
              tests_done=true
              echo "--- Test summary detected in output ---"
              break
            fi
            sleep 2
          done

          # Phase 2: If Playwright is still running (teardown hang),
          # give it 15s grace then force-kill.
          if kill -0 "$PW_PID" 2>/dev/null; then
            if [ "$tests_done" = "true" ]; then
              echo "Tests finished but webServer teardown is hanging — killing in 15s"
            fi
            sleep 15
            if kill -0 "$PW_PID" 2>/dev/null; then
              echo "::warning::Killing lingering Playwright process tree"
              kill "$PW_PID" 2>/dev/null
              sleep 5
              kill -9 "$PW_PID" 2>/dev/null
            fi
            wait "$PW_PID" 2>/dev/null
            pw_exit=124
          else
            wait "$PW_PID"
            pw_exit=$?
          fi

          # Stop the tail follower.
          kill "$TAIL_PID" 2>/dev/null
          wait "$TAIL_PID" 2>/dev/null

          echo "Playwright exited with code $pw_exit"

          # When killed during teardown, the exit code is non-zero but
          # tests may have passed. Parse the line reporter summary.
          if [ "$pw_exit" -ne 0 ] && [ -f "$PW_LOG" ]; then
            echo "Checking PW_LOG for pass/fail..."
            grep -E "passed|failed|timed out" "$PW_LOG" || echo "(no match)"
            if grep -qE "[0-9]+ passed" "$PW_LOG" && ! grep -qE "[0-9]+ failed|[0-9]+ timed out" "$PW_LOG"; then
              echo "::notice::All tests passed per Playwright output; non-zero exit was teardown-related"
              pw_exit=0
            else
              echo "Tests had failures per Playwright output"
            fi
          fi

          echo "exit_code=$pw_exit" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test artifacts
        id: upload_artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mock-llm-e2e-results
          if-no-files-found: ignore
          retention-days: 14
          path: |
            playwright-report-mock-llm/
            test-results-mock-llm/

      - name: Render test report
        if: always()
        run: |
          node tests/e2e/mock-llm/scripts/render-mock-llm-report.mjs \
            --results "test-results-mock-llm/results.json" \
            --output "$MOCK_LLM_REPORT_PATH" \
            --workflow-url "$MOCK_LLM_WORKFLOW_URL" \
            --commit "${{ github.event.pull_request.head.sha || github.sha }}" \
            --artifact-url "${{ steps.upload_artifacts.outputs.artifact-url || '' }}"
          cat "$MOCK_LLM_REPORT_PATH" >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: always() && github.event.pull_request.number
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file "$MOCK_LLM_REPORT_PATH"

      - name: Fail job when tests fail
        if: always()
        run: |
          exit_code="${{ steps.run_tests.outputs.exit_code }}"
          exit "${exit_code:-1}"
