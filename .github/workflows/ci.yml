name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to comment on when running manually.
        required: false
        default: ""

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js with npm cache
        if: runner.os != 'Windows'
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Set up Node.js
        if: runner.os == 'Windows'
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  live-e2e:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'live-e2e')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: live-e2e-media-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      LIVE_E2E_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LIVE_E2E_LLM_BASE_URL: ${{ vars.LIVE_E2E_LLM_BASE_URL || 'https://llm-proxy.app.all-hands.dev' }}
      LIVE_E2E_LLM_MODEL: ${{ vars.LIVE_E2E_LLM_MODEL || 'openhands/claude-haiku-4-5-20251001' }}
      LIVE_E2E_PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number || '' }}
      LIVE_E2E_REPORT_PATH: live-e2e-report.md
      LIVE_E2E_WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      LIVE_E2E_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm

      - name: Create live E2E PR comment
        if: env.LIVE_E2E_PR_NUMBER != ''
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/render-live-e2e-report.mjs \
            --status running \
            --model "$LIVE_E2E_LLM_MODEL" \
            --workflow-url "$LIVE_E2E_WORKFLOW_URL" \
            --commit "$LIVE_E2E_COMMIT_SHA" \
            --timestamp "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            --output "$LIVE_E2E_REPORT_PATH"
          node scripts/upsert-pr-comment.mjs \
            --issue-number "$LIVE_E2E_PR_NUMBER" \
            --body-file "$LIVE_E2E_REPORT_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Install uv
        if: env.LIVE_E2E_LLM_API_KEY != ''
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Playwright Chromium
        if: env.LIVE_E2E_LLM_API_KEY != ''
        run: npx playwright install --with-deps chromium

      - name: Run live Agent Server E2E
        id: live_test
        if: env.LIVE_E2E_LLM_API_KEY != ''
        run: |
          set +e
          npm run test:e2e:live
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Skip live Agent Server E2E
        if: env.LIVE_E2E_LLM_API_KEY == ''
        run: echo "Skipping live Agent Server E2E because LLM_API_KEY is not configured."

      - name: Extract live E2E media
        id: live_media
        if: always() && env.LIVE_E2E_LLM_API_KEY != ''
        run: |
          node scripts/extract-live-e2e-media.mjs \
            --results "test-results-live/results.json" \
            --output-dir "live-e2e-media"

      - name: Create live E2E video preview
        id: live_video_preview
        if: always() && steps.live_media.outputs.video_path != ''
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -y \
            -i "${{ steps.live_media.outputs.video_path }}" \
            -vf "fps=4,scale=960:-1:flags=lanczos" \
            -loop 0 \
            live-e2e-media/live-agent-recording.gif
          echo "video_preview_path=live-e2e-media/live-agent-recording.gif" >> "$GITHUB_OUTPUT"

      - name: Publish live E2E media
        id: publish_live_media
        if: always() && env.LIVE_E2E_LLM_API_KEY != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          MEDIA_BRANCH: live-e2e-artifacts
          MEDIA_KEEP_RUNS: 3
          MEDIA_PR_DIR: pr-${{ env.LIVE_E2E_PR_NUMBER || 'manual' }}
          MEDIA_RUN_DIR: ${{ github.run_id }}
          SCREENSHOT_PATH: ${{ steps.live_media.outputs.screenshot_path || '' }}
          VIDEO_PATH: ${{ steps.live_media.outputs.video_path || '' }}
          VIDEO_PREVIEW_PATH: ${{ steps.live_video_preview.outputs.video_preview_path || '' }}
        run: |
          set -euo pipefail

          if [ -z "$SCREENSHOT_PATH" ] && [ -z "$VIDEO_PREVIEW_PATH" ] && [ -z "$VIDEO_PATH" ]; then
            echo "No live E2E media was produced."
            exit 0
          fi

          media_url() {
            printf 'https://raw.githubusercontent.com/%s/%s/%s/%s/%s\n' "$GITHUB_REPOSITORY" "$MEDIA_BRANCH" "$MEDIA_PR_DIR" "$MEDIA_RUN_DIR" "$1"
          }

          rm -rf .live-e2e-media-current .live-e2e-media-next .live-e2e-media-push
          mkdir -p .live-e2e-media-current .live-e2e-media-next

          if git ls-remote --exit-code --heads origin "$MEDIA_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$MEDIA_BRANCH"
            git archive --format=tar FETCH_HEAD | tar -x -C .live-e2e-media-current
            cp -a .live-e2e-media-current/. .live-e2e-media-next/
          fi

          media_dir=".live-e2e-media-next/$MEDIA_PR_DIR/$MEDIA_RUN_DIR"
          mkdir -p "$media_dir"

          if [ -n "$SCREENSHOT_PATH" ]; then
            cp "$SCREENSHOT_PATH" "$media_dir/live-agent-response.png"
            echo "screenshot_url=$(media_url "live-agent-response.png")" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$VIDEO_PREVIEW_PATH" ]; then
            cp "$VIDEO_PREVIEW_PATH" "$media_dir/live-agent-recording.gif"
            echo "video_preview_url=$(media_url "live-agent-recording.gif")" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$VIDEO_PATH" ]; then
            cp "$VIDEO_PATH" "$media_dir/live-agent-recording.webm"
            echo "video_url=$(media_url "live-agent-recording.webm")" >> "$GITHUB_OUTPUT"
          fi

          if [ -d ".live-e2e-media-next/$MEDIA_PR_DIR" ]; then
            find ".live-e2e-media-next/$MEDIA_PR_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' |
              sort -nr |
              tail -n "+$((MEDIA_KEEP_RUNS + 1))" |
              while IFS= read -r stale_run; do
                [ -n "$stale_run" ] || continue
                rm -rf ".live-e2e-media-next/$MEDIA_PR_DIR/$stale_run"
              done
          fi

          gh api --paginate "repos/$GITHUB_REPOSITORY/pulls?state=open&per_page=100" --jq '.[].number' > live-e2e-open-prs.txt
          find .live-e2e-media-next -mindepth 1 -maxdepth 1 -type d -name 'pr-*' -printf '%f\n' |
            while IFS= read -r pr_dir; do
              pr_number="${pr_dir#pr-}"
              [[ "$pr_number" =~ ^[0-9]+$ ]] || continue
              if ! grep -qx "$pr_number" live-e2e-open-prs.txt; then
                rm -rf ".live-e2e-media-next/$pr_dir"
              fi
            done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git worktree add --detach .live-e2e-media-push
          git -C .live-e2e-media-push checkout --orphan "$MEDIA_BRANCH"
          git -C .live-e2e-media-push rm -rf . >/dev/null 2>&1 || true
          cp -a .live-e2e-media-next/. .live-e2e-media-push/
          touch .live-e2e-media-push/.nojekyll
          git -C .live-e2e-media-push add -A
          if ! git -C .live-e2e-media-push diff --cached --quiet; then
            git -C .live-e2e-media-push commit -m "Publish live E2E media for run $GITHUB_RUN_ID"
            git -C .live-e2e-media-push push origin HEAD:"$MEDIA_BRANCH" --force
          fi

      - name: Upload live E2E artifacts
        id: upload_live_artifacts
        if: always() && env.LIVE_E2E_LLM_API_KEY != ''
        uses: actions/upload-artifact@v6
        with:
          name: live-agent-server-e2e
          if-no-files-found: ignore
          path: |
            playwright-report-live/
            test-results-live/

      - name: Determine live E2E result
        id: live_status
        if: always()
        run: |
          if [ -z "$LIVE_E2E_LLM_API_KEY" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "reason=LLM_API_KEY is not configured." >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          exit_code="${{ steps.live_test.outputs.exit_code }}"
          if [ -z "$exit_code" ]; then
            exit_code=1
          fi

          if [ "$exit_code" = "0" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          echo "reason=" >> "$GITHUB_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Render live E2E report
        if: always()
        env:
          LIVE_E2E_ARTIFACT_URL: ${{ steps.upload_live_artifacts.outputs.artifact-url || '' }}
          LIVE_E2E_SCREENSHOT_URL: ${{ steps.publish_live_media.outputs.screenshot_url || '' }}
          LIVE_E2E_STATUS: ${{ steps.live_status.outputs.status }}
          LIVE_E2E_REASON: ${{ steps.live_status.outputs.reason }}
          LIVE_E2E_VIDEO_PREVIEW_URL: ${{ steps.publish_live_media.outputs.video_preview_url || '' }}
          LIVE_E2E_VIDEO_URL: ${{ steps.publish_live_media.outputs.video_url || '' }}
        run: |
          node scripts/render-live-e2e-report.mjs \
            --status "$LIVE_E2E_STATUS" \
            --reason "$LIVE_E2E_REASON" \
            --results "test-results-live/results.json" \
            --model "$LIVE_E2E_LLM_MODEL" \
            --workflow-url "$LIVE_E2E_WORKFLOW_URL" \
            --artifact-url "$LIVE_E2E_ARTIFACT_URL" \
            --screenshot-url "$LIVE_E2E_SCREENSHOT_URL" \
            --video-preview-url "$LIVE_E2E_VIDEO_PREVIEW_URL" \
            --video-url "$LIVE_E2E_VIDEO_URL" \
            --commit "$LIVE_E2E_COMMIT_SHA" \
            --timestamp "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
            --output "$LIVE_E2E_REPORT_PATH"
          cat "$LIVE_E2E_REPORT_PATH" >> "$GITHUB_STEP_SUMMARY"

      - name: Update live E2E PR comment
        if: always() && env.LIVE_E2E_PR_NUMBER != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node scripts/upsert-pr-comment.mjs \
            --issue-number "$LIVE_E2E_PR_NUMBER" \
            --body-file "$LIVE_E2E_REPORT_PATH"

      - name: Fail live E2E job when tests fail
        if: always() && env.LIVE_E2E_LLM_API_KEY != ''
        run: exit "${{ steps.live_status.outputs.exit_code }}"
