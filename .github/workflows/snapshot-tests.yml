name: Snapshot Tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: snapshot-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  snapshot-tests:
    name: Visual Snapshot Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run snapshot tests
        run: npm run test:e2e:snapshots

      - name: Upload snapshot diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
