name: Snapshot Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Update baseline snapshots"
        type: boolean
        default: false

concurrency:
  group: snapshot-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  snapshot-tests:
    name: Visual Snapshot Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run snapshot tests
        if: ${{ github.event.inputs.update_snapshots != 'true' }}
        run: npm run test:e2e:snapshots

      - name: Update snapshots
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        run: npm run test:e2e:snapshots:update

      - name: Commit updated snapshots
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/__snapshots__/
          git diff --staged --quiet || git commit -m "chore: update baseline snapshots [skip ci]"
          git push

      - name: Upload snapshot diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
