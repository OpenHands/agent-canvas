<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1060" viewBox="0 0 1600 1060" role="img" aria-labelledby="title desc">
  <title id="title">Agent Canvas Greys Palette</title>
  <desc id="desc">Grey colors currently used in the app, grouped by similarity and ordered light to dark.</desc>

  <defs>
    <style>
      .bg { fill: #0B0D10; }
      .panel { fill: #12151A; stroke: #2A2F38; stroke-width: 1; }
      .title { fill: #F4F6FA; font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .subtitle { fill: #A8B0C0; font: 400 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .group { fill: #DDE3EF; font: 600 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .hex { fill: #FFFFFF; font: 600 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
      .use { fill: #BFC8D8; font: 400 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      .rowline { stroke: #242B36; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1060" />
  <rect class="panel" x="28" y="28" width="1544" height="1004" rx="14" />

  <text class="title" x="56" y="78">Agent Canvas Grey Palette</text>
  <text class="subtitle" x="56" y="104">Grouped by tone similarity, ordered light -> dark. Usage notes are representative codebase contexts.</text>

  <!-- Group 1 -->
  <text class="group" x="56" y="150">1) Text / Foreground Neutrals (light)</text>

  <rect x="56" y="170" width="44" height="24" rx="4" fill="#F9FBFE" stroke="#2A2F38" />
  <text class="hex" x="116" y="187">#F9FBFE</text>
  <text class="use" x="260" y="187">High-contrast foreground token (`--oh-color-content-2`, danger foreground)</text>

  <rect x="56" y="206" width="44" height="24" rx="4" fill="#F4F4F5" stroke="#2A2F38" />
  <text class="hex" x="116" y="223">#F4F4F5</text>
  <text class="use" x="260" y="223">Shine text effect fallback color</text>

  <rect x="56" y="242" width="44" height="24" rx="4" fill="#ECEDEE" stroke="#2A2F38" />
  <text class="hex" x="116" y="259">#ECEDEE</text>
  <text class="use" x="260" y="259">Primary foreground token (`--oh-foreground`, links, default foreground)</text>

  <rect x="56" y="278" width="44" height="24" rx="4" fill="#D5D9E5" stroke="#2A2F38" />
  <text class="hex" x="116" y="295">#D5D9E5</text>
  <text class="use" x="260" y="295">Softer markdown heading text (`h5`) in chat content</text>

  <rect x="56" y="314" width="44" height="24" rx="4" fill="#B7BDC2" stroke="#2A2F38" />
  <text class="hex" x="116" y="331">#B7BDC2</text>
  <text class="use" x="260" y="331">Tertiary-light token (`--oh-color-tertiary-light`)</text>

  <rect x="56" y="350" width="44" height="24" rx="4" fill="#A3A3A3" stroke="#2A2F38" />
  <text class="hex" x="116" y="367">#A3A3A3</text>
  <text class="use" x="260" y="367">Sidebar/home muted labels and placeholder-like text</text>

  <line class="rowline" x1="56" y1="386" x2="1540" y2="386" />

  <!-- Group 2 -->
  <text class="group" x="56" y="426">2) Cool Mid-Greys (UI text, icons, controls)</text>

  <rect x="56" y="446" width="44" height="24" rx="4" fill="#959CB2" stroke="#2A2F38" />
  <text class="hex" x="116" y="463">#959CB2</text>
  <text class="use" x="260" y="463">Primary muted chat control color (pills, chevrons, status text, typing dots, scroll button)</text>

  <rect x="56" y="482" width="44" height="24" rx="4" fill="#9299AA" stroke="#2A2F38" />
  <text class="hex" x="116" y="499">#9299AA</text>
  <text class="use" x="260" y="499">Files tab muted text in empty/centered states</text>

  <rect x="56" y="518" width="44" height="24" rx="4" fill="#9099AC" stroke="#2A2F38" />
  <text class="hex" x="116" y="535">#9099AC</text>
  <text class="use" x="260" y="535">Global muted token (`--oh-muted`, `--oh-color-basic`)</text>

  <rect x="56" y="554" width="44" height="24" rx="4" fill="#8D95A9" stroke="#2A2F38" />
  <text class="hex" x="116" y="571">#8D95A9</text>
  <text class="use" x="260" y="571">Diff viewer secondary text</text>

  <rect x="56" y="590" width="44" height="24" rx="4" fill="#8C8C8C" stroke="#2A2F38" />
  <text class="hex" x="116" y="607">#8C8C8C</text>
  <text class="use" x="260" y="607">Sidebar/extensions muted labels and badges</text>

  <rect x="56" y="626" width="44" height="24" rx="4" fill="#727987" stroke="#2A2F38" />
  <text class="hex" x="116" y="643">#727987</text>
  <text class="use" x="260" y="643">Home dropdown borders / input outlines</text>

  <rect x="56" y="662" width="44" height="24" rx="4" fill="#717888" stroke="#2A2F38" />
  <text class="hex" x="116" y="679">#717888</text>
  <text class="use" x="260" y="679">Core border token (`--oh-border`), dropdown/input border styling</text>

  <line class="rowline" x1="56" y1="698" x2="1540" y2="698" />

  <!-- Group 3 -->
  <text class="group" x="56" y="738">3) Surface / Border Greys (dark, light ť dark)</text>

  <rect x="56" y="758" width="44" height="24" rx="4" fill="#5C5D62" stroke="#2A2F38" />
  <text class="hex" x="116" y="775">#5C5D62</text>
  <text class="use" x="260" y="775">Dropdown hover rows and separators</text>

  <rect x="56" y="794" width="44" height="24" rx="4" fill="#525252" stroke="#2A2F38" />
  <text class="hex" x="116" y="811">#525252</text>
  <text class="use" x="260" y="811">Chat repo button borders / legacy neutral border usage</text>

  <rect x="56" y="830" width="44" height="24" rx="4" fill="#4B505F" stroke="#2A2F38" />
  <text class="hex" x="116" y="847">#4B505F</text>
  <text class="use" x="260" y="847">Markdown horizontal-rule dividers (chat)</text>

  <rect x="56" y="866" width="44" height="24" rx="4" fill="#474A54" stroke="#2A2F38" />
  <text class="hex" x="116" y="883">#474A54</text>
  <text class="use" x="260" y="883">Files tab hover states and panel borders</text>

  <rect x="56" y="902" width="44" height="24" rx="4" fill="#454545" stroke="#2A2F38" />
  <text class="hex" x="116" y="919">#454545</text>
  <text class="use" x="260" y="919">Tertiary/default surface token (`--oh-default`, `--oh-color-tertiary`)</text>

  <rect x="56" y="938" width="44" height="24" rx="4" fill="#3A3D46" stroke="#2A2F38" />
  <text class="hex" x="116" y="955">#3A3D46</text>
  <text class="use" x="260" y="955">Scroll-to-bottom button hover background</text>

  <rect x="56" y="974" width="44" height="24" rx="4" fill="#25272D" stroke="#2A2F38" />
  <text class="hex" x="116" y="991">#25272D</text>
  <text class="use" x="260" y="991">Chat input/status/typing pill surface background</text>

  <rect x="840" y="758" width="44" height="24" rx="4" fill="#24272E" stroke="#2A2F38" />
  <text class="hex" x="900" y="775">#24272E</text>
  <text class="use" x="1044" y="775">Primary secondary surface token (`--oh-surface`, overlay base)</text>

  <rect x="840" y="794" width="44" height="24" rx="4" fill="#1F2228" stroke="#2A2F38" />
  <text class="hex" x="900" y="811">#1F2228</text>
  <text class="use" x="1044" y="811">Sidebar nav hover popover background</text>

  <rect x="840" y="830" width="44" height="24" rx="4" fill="#1F1F1F" stroke="#2A2F38" />
  <text class="hex" x="900" y="847">#1F1F1F99</text>
  <text class="use" x="1044" y="847">Semi-transparent sidebar active/hover state (`99` alpha)</text>

  <rect x="840" y="866" width="44" height="24" rx="4" fill="#0D0F11" stroke="#2A2F38" />
  <text class="hex" x="900" y="883">#0D0F11</text>
  <text class="use" x="1044" y="883">Global background token (`--oh-background`, accent foreground)</text>

  <text class="subtitle" x="56" y="1020">Generated from current source usage in `src/` (explicit hex greys + core theme neutral tokens).</text>
</svg>
